name: cat_tinder
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  cached_network_image: ^3.4.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_analytics: ^11.3.3
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/Icon.png

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/Icon.png"
  image_path: assets/Icon.png
  adaptive_icon_background: "#FFF3D6"
  adaptive_icon_foreground: assets/Icon.png
